<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />

    <title>Sellmann Waks</title>

    <script>
      (function (location) {
        if (location.search[1] === "/") {
          const decoded = location.search
            .slice(1)
            .split("&")
            .map(function (value) {
              return value.replace(/~and~/g, "&");
            })
            .join("?");

          window.history.replaceState(
            null,
            null,
            location.pathname.slice(0, -1) +
              decoded +
              location.hash
          );
        }
      })(window.location);
    </script>
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
